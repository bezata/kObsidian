name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Also publish to npm (requires `npm trust github` registered for this repo + workflow file)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  # Force any remaining Node-20-bundled JavaScript actions onto the
  # Node 24 runtime that GitHub will default to on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-bundles:
    name: Build mcpb bundles + compiled binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: darwin-x64
            bun_target: bun-darwin-x64
            binary_name: kobsidian
          - platform: darwin-arm64
            bun_target: bun-darwin-arm64
            binary_name: kobsidian
          - platform: linux-x64
            bun_target: bun-linux-x64
            binary_name: kobsidian
          - platform: linux-arm64
            bun_target: bun-linux-arm64
            binary_name: kobsidian
          - platform: windows-x64
            bun_target: bun-windows-x64
            binary_name: kobsidian.exe
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Compile kobsidian binary
        run: |
          bun build --compile --target=${{ matrix.bun_target }} src/server/stdio.ts \
            --outfile dist/${{ matrix.binary_name }}
      - name: Build .mcpb bundle
        env:
          KOBSIDIAN_BUNDLE_BINARY: dist/${{ matrix.binary_name }}
          KOBSIDIAN_BUNDLE_PLATFORM: ${{ matrix.platform }}
          KOBSIDIAN_BUNDLE_OUTPUT: release/kobsidian-${{ matrix.platform }}.mcpb
        run: bun run scripts/make-mcpb.mjs
      - uses: actions/upload-artifact@v7
        with:
          name: kobsidian-${{ matrix.platform }}
          path: |
            release/kobsidian-${{ matrix.platform }}.mcpb
            dist/${{ matrix.binary_name }}
          retention-days: 7

  publish-release:
    name: Attach bundles to release
    needs: build-bundles
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.mcpb

  virustotal:
    name: VirusTotal scan release assets
    needs: publish-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Download at the workspace root (no explicit `path:`) so the
      # archive's internal tree — which already contains a `release/`
      # directory — is recreated as-is. A `path: release/` + the
      # archive's own `release/...` prefix would produce
      # `release/release/*.mcpb` and make the VT regex below miss.
      - name: Download .mcpb bundles from build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: kobsidian-*
          merge-multiple: true
      - name: List downloaded files
        run: |
          echo "=== release/ tree ==="
          ls -la release/ || true
          echo "=== all .mcpb ==="
          find . -name '*.mcpb' -type f 2>/dev/null
      - name: Scan .mcpb bundles
        id: vt
        # `continue-on-error: true` because the action fails hard with
        # `AxiosError: status code 409` when VT already has a file with
        # the same SHA-256 (our rebuilds produce byte-identical
        # binaries, and VT rejects duplicate uploads). That's fine —
        # the next step polls `/api/v3/files/<sha>` directly, which
        # returns the existing analysis regardless of who uploaded it.
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          update_release_body: true
          request_rate: 4
          # The action's `files:` input is passed to `glob.sync()` —
          # it's a glob, not a regex. README examples like `.exe$` are
          # misleading; the `$` is literal in glob. Use a real glob.
          files: |
            release/*.mcpb
      - name: Sanity-check VT upload step
        # The action can return 409 per-file when VT already has a
        # bundle with the same SHA-256 (marked `continue-on-error`
        # above). Log its final state but don't fail — the next step
        # polls VT directly by SHA-256 and is authoritative.
        if: always()
        run: |
          echo "VT action outcome: ${{ steps.vt.outcome }}"
          echo "VT action conclusion: ${{ steps.vt.conclusion }}"
          echo "analysis output:     '${{ steps.vt.outputs.analysis }}'"

      - name: Fetch VT verdicts and append to release body
        # Two fixes rolled into one step:
        #
        # 1. `update_release_body: true` on the VT action only fires when
        #    triggered by `release: published`; on `push: tags` it reads
        #    an empty `github.context.payload.release` and silently skips.
        # 2. The VT action's `analysis` output uses
        #    `/gui/file-analysis/<id>/detection` URLs that are **temporary**
        #    — the pages 404 once analysis completes. We want permanent
        #    `/gui/file/<sha256>` links *plus* the actual verdict.
        #
        # Flow: for each bundle, compute SHA-256 → poll VT's `/api/v3/
        # files/<sha256>` (with backoff up to ~5 min) for completed
        # analysis stats → render a verdict line (✅ Clean / ⚠️ N
        # malicious / … · N/T engines · permanent link · sha256). Fail
        # the job if any file has `malicious > 0`.
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          any_malicious=0
          any_suspicious=0
          pending_count=0
          bundle_count=0

          {
            echo
            echo
            echo "## 🛡 VirusTotal analysis"
            echo
            echo "Every \`.mcpb\` bundle in this release was uploaded to [VirusTotal](https://www.virustotal.com) by GitHub Actions and scanned by 70+ antivirus engines. Click any row for the full report."
            echo
            echo "| Bundle | Verdict | Engines | SHA-256 |"
            echo "|---|---|---|---|"
          } > /tmp/vt-block.md

          for file in release/*.mcpb; do
            bundle_count=$((bundle_count + 1))
            sha=$(sha256sum "$file" | awk '{print $1}')
            name=$(basename "$file")
            report_url="https://www.virustotal.com/gui/file/${sha}"

            # Poll /files/<sha256> until real engine counts arrive.
            # `last_analysis_stats` can come back as
            # {"malicious":0,"suspicious":0,"undetected":0,...} while the
            # scan is still queued — that's non-null but total == 0.
            # Only break when total engines > 0, indicating analysis ran.
            # Bundle scans (large binaries) routinely take 5-15 min.
            malicious=0; suspicious=0; undetected=0; harmless=0; timeout_count=0; total=0
            for attempt in $(seq 1 30); do
              resp=$(curl -sf -H "x-apikey: ${VT_API_KEY}" \
                "https://www.virustotal.com/api/v3/files/${sha}" || true)
              if [ -n "$resp" ]; then
                malicious=$(printf '%s' "$resp" | jq -r '.data.attributes.last_analysis_stats.malicious // 0' 2>/dev/null || echo 0)
                suspicious=$(printf '%s' "$resp" | jq -r '.data.attributes.last_analysis_stats.suspicious // 0' 2>/dev/null || echo 0)
                undetected=$(printf '%s' "$resp" | jq -r '.data.attributes.last_analysis_stats.undetected // 0' 2>/dev/null || echo 0)
                harmless=$(printf '%s' "$resp" | jq -r '.data.attributes.last_analysis_stats.harmless // 0' 2>/dev/null || echo 0)
                timeout_count=$(printf '%s' "$resp" | jq -r '.data.attributes.last_analysis_stats.timeout // 0' 2>/dev/null || echo 0)
                total=$((malicious + suspicious + undetected + harmless + timeout_count))
                if [ "$total" -gt 0 ]; then
                  break
                fi
              fi
              echo "[${name}] VT analysis pending (attempt ${attempt}/30, sleep 20s) …"
              sleep 20
            done

            if [ "$total" -eq 0 ]; then
              verdict="⏳ Pending"
              engines="pending"
              pending_count=$((pending_count + 1))
              echo "::warning::VT analysis for ${name} not completed within poll budget; release body shows 'Pending'."
            else
              if [ "$malicious" -gt 0 ]; then
                verdict="⚠️ **${malicious} malicious**"
                any_malicious=1
              elif [ "$suspicious" -gt 0 ]; then
                verdict="⚠️ ${suspicious} suspicious"
                any_suspicious=1
              else
                verdict="✅ Clean"
              fi
              clean=$((undetected + harmless))
              engines="${clean}/${total} clean"
            fi

            short_sha="${sha:0:12}…"
            echo "| [\`${name}\`](${report_url}) | ${verdict} | ${engines} | \`${short_sha}\` |" \
              >> /tmp/vt-block.md
          done

          {
            echo
            echo "<details><summary>Full SHA-256 hashes</summary>"
            echo
            for file in release/*.mcpb; do
              sha=$(sha256sum "$file" | awk '{print $1}')
              name=$(basename "$file")
              echo "- \`${name}\` — \`${sha}\`"
            done
            echo
            echo "</details>"
          } >> /tmp/vt-block.md

          echo "=== VT block ==="
          cat /tmp/vt-block.md

          # Preserve existing body (if any) and append.
          # `--repo` is required — this job has no checkout, so gh
          # can't auto-detect the owner/repo from a git directory.
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --json body --jq '.body' > /tmp/body-current.md 2>/dev/null || true
          cat /tmp/body-current.md /tmp/vt-block.md > /tmp/body-final.md
          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --notes-file /tmp/body-final.md
          echo "Release body updated."

          # Export flags for the badge-update step.
          {
            echo "VT_ANY_MALICIOUS=${any_malicious}"
            echo "VT_ANY_SUSPICIOUS=${any_suspicious}"
            echo "VT_PENDING_COUNT=${pending_count}"
            echo "VT_BUNDLE_COUNT=${bundle_count}"
          } >> "$GITHUB_ENV"

          if [ "$any_malicious" -eq 1 ]; then
            echo "::error::One or more bundles flagged as malicious by VirusTotal — blocking release."
            exit 1
          fi
          if [ "$any_suspicious" -eq 1 ]; then
            echo "::warning::One or more bundles flagged as suspicious by VirusTotal — review the release body."
          fi
          if [ "$pending_count" -eq "$bundle_count" ] && [ "$bundle_count" -gt 0 ]; then
            echo "::error::All ${bundle_count} bundles timed out as 'Pending' — VT never returned stats for any file. Investigate rate-limits or API connectivity before shipping."
            exit 1
          fi

      - name: Update VirusTotal shields.io endpoint badge
        # Writes .github/badges/virustotal.json via an auto-merging PR,
        # so `main`'s branch-protection ruleset (which requires PRs for
        # humans and the github-actions[bot] integration alike) doesn't
        # 409 this step. The PR is squash-merged by `--auto` as soon as
        # eligibility is met — with 0 required approvals, that's
        # immediate. No-op if the badge content hasn't changed.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ "${VT_ANY_MALICIOUS:-0}" = "1" ]; then
            message="malicious detection ⚠"
            color="critical"
          elif [ "${VT_ANY_SUSPICIOUS:-0}" = "1" ]; then
            message="suspicious ⚠"
            color="yellow"
          else
            total="${VT_BUNDLE_COUNT:-0}"
            pending="${VT_PENDING_COUNT:-0}"
            clean=$((total - pending))
            if [ "$pending" -gt 0 ]; then
              message="clean · ${clean}/${total} scanned · ${RELEASE_TAG}"
              color="green"
            else
              message="clean · ${total}/${total} bundles · ${RELEASE_TAG}"
              color="brightgreen"
            fi
          fi

          badge_path=".github/badges/virustotal.json"
          branch_name="ci/vt-badge-${RELEASE_TAG}-${GITHUB_RUN_ID}"

          workdir="$(mktemp -d)"
          git clone --depth 1 --branch main \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$workdir"
          cd "$workdir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p "$(dirname "$badge_path")"
          cat > "$badge_path" <<EOF
          {
            "schemaVersion": 1,
            "label": "VirusTotal",
            "message": "${message}",
            "color": "${color}",
            "namedLogo": "virustotal",
            "logoColor": "white",
            "cacheSeconds": 300
          }
          EOF

          if git diff --quiet -- "$badge_path"; then
            echo "VT badge unchanged — skipping PR."
            exit 0
          fi

          git checkout -b "$branch_name"
          git add "$badge_path"
          git commit -m "chore(badges): update VirusTotal status for ${RELEASE_TAG}"
          git push origin "$branch_name"

          pr_url=$(gh pr create \
            --base main \
            --head "$branch_name" \
            --title "chore(badges): update VT status for ${RELEASE_TAG}" \
            --body "Auto-generated by the Release workflow for \`${RELEASE_TAG}\`. Updates \`${badge_path}\` so the README shields.io endpoint badge reflects the latest VirusTotal verdict.")
          echo "Opened badge PR: ${pr_url}"

          gh pr merge "$pr_url" --squash --auto --delete-branch
          echo "Auto-merge enabled on ${pr_url}"
          cat "$badge_path"

  npm-publish:
    name: Publish to npm
    # Wait for virustotal (on tag push) so we only publish after the
    # bundles have been scanned clean. For workflow_dispatch,
    # virustotal is skipped; the `always() + skipped tolerance` makes
    # that path still publish.
    needs: [build-bundles, virustotal]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-bundles.result == 'success' &&
      (needs.virustotal.result == 'success' || needs.virustotal.result == 'skipped') &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm == 'true')
      )
    permissions:
      contents: read
      id-token: write  # mints the OIDC token for npm Trusted Publishing
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - name: Publish (npm Trusted Publishing via OIDC)
        # No NODE_AUTH_TOKEN / NPM_TOKEN — the npm CLI automatically
        # exchanges the GitHub Actions OIDC token for a short-lived
        # npm publish token, provided:
        #   1. Node.js >= 24 + npm >= 11
        #   2. id-token: write permission on this job (set above)
        #   3. A one-time `npm trust github --file .github/workflows/release.yml
        #      --repo bezata/kObsidian` run locally to register the trust
        # Provenance is automatic under Trusted Publishing.
        #
        # Idempotency: skip cleanly if this version is already on npm so
        # re-tagging the same version (e.g. to regenerate VT scan links
        # in the release body) doesn't break the workflow.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "kobsidian-mcp@$VERSION" version > /dev/null 2>&1; then
            echo "kobsidian-mcp@$VERSION already on npm; skipping publish."
            exit 0
          fi
          npm publish --access public
