name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Also publish to npm (needs NPM_TOKEN secret)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-bundles:
    name: Build mcpb bundles + compiled binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: darwin-x64
            bun_target: bun-darwin-x64
            binary_name: kobsidian
          - platform: darwin-arm64
            bun_target: bun-darwin-arm64
            binary_name: kobsidian
          - platform: linux-x64
            bun_target: bun-linux-x64
            binary_name: kobsidian
          - platform: linux-arm64
            bun_target: bun-linux-arm64
            binary_name: kobsidian
          - platform: windows-x64
            bun_target: bun-windows-x64
            binary_name: kobsidian.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Compile kobsidian binary
        run: |
          bun build --compile --target=${{ matrix.bun_target }} src/server/stdio.ts \
            --outfile dist/${{ matrix.binary_name }}
      - name: Build .mcpb bundle
        env:
          KOBSIDIAN_BUNDLE_BINARY: dist/${{ matrix.binary_name }}
          KOBSIDIAN_BUNDLE_PLATFORM: ${{ matrix.platform }}
          KOBSIDIAN_BUNDLE_OUTPUT: release/kobsidian-${{ matrix.platform }}.mcpb
        run: bun run scripts/make-mcpb.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: kobsidian-${{ matrix.platform }}
          path: |
            release/kobsidian-${{ matrix.platform }}.mcpb
            dist/${{ matrix.binary_name }}
          retention-days: 7

  publish-release:
    name: Attach bundles to release
    needs: build-bundles
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.mcpb

  npm-publish:
    name: Publish to npm
    needs: build-bundles
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
