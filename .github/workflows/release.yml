name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Also publish to npm (needs NPM_TOKEN secret)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  # Force any remaining Node-20-bundled JavaScript actions onto the
  # Node 24 runtime that GitHub will default to on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-bundles:
    name: Build mcpb bundles + compiled binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: darwin-x64
            bun_target: bun-darwin-x64
            binary_name: kobsidian
          - platform: darwin-arm64
            bun_target: bun-darwin-arm64
            binary_name: kobsidian
          - platform: linux-x64
            bun_target: bun-linux-x64
            binary_name: kobsidian
          - platform: linux-arm64
            bun_target: bun-linux-arm64
            binary_name: kobsidian
          - platform: windows-x64
            bun_target: bun-windows-x64
            binary_name: kobsidian.exe
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Compile kobsidian binary
        run: |
          bun build --compile --target=${{ matrix.bun_target }} src/server/stdio.ts \
            --outfile dist/${{ matrix.binary_name }}
      - name: Build .mcpb bundle
        env:
          KOBSIDIAN_BUNDLE_BINARY: dist/${{ matrix.binary_name }}
          KOBSIDIAN_BUNDLE_PLATFORM: ${{ matrix.platform }}
          KOBSIDIAN_BUNDLE_OUTPUT: release/kobsidian-${{ matrix.platform }}.mcpb
        run: bun run scripts/make-mcpb.mjs
      - uses: actions/upload-artifact@v5
        with:
          name: kobsidian-${{ matrix.platform }}
          path: |
            release/kobsidian-${{ matrix.platform }}.mcpb
            dist/${{ matrix.binary_name }}
          retention-days: 7

  publish-release:
    name: Attach bundles to release
    needs: build-bundles
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*.mcpb

  virustotal:
    name: VirusTotal scan release assets
    needs: publish-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download .mcpb bundles from build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release
          pattern: kobsidian-*
          merge-multiple: true
      - name: Scan .mcpb bundles
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          update_release_body: true
          request_rate: 4
          files: |
            release/.*\.mcpb$

  npm-publish:
    name: Publish to npm
    needs: build-bundles
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm == 'true')
    permissions:
      contents: read
      id-token: write  # required for npm publish --provenance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
